<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>わくわくタイマー</title>
    <meta name="description" content="子供が楽しく使える、アニメーションいっぱいのタイマーアプリです。">
    
    <!-- PWA & Mobile Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="わくわくタイマー">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1 id="timer-display">00:00</h1>
        </header>

        <main>
            <div class="circle-container">
                <div class="pie-chart-bg"></div>
                <div id="pie-chart" class="pie-chart"></div>
            </div>
        </main>

        <footer>
            <div class="preset-buttons">
                <button class="preset-btn" data-time="1">01:00</button>
                <button class="preset-btn" data-time="2">02:00</button>
                <button class="preset-btn" data-time="3">03:00</button>
                <button class="preset-btn" data-time="5">05:00</button>
                <button class="preset-btn" data-time="10">10:00</button>
                <button id="custom-btn" class="preset-btn custom">00:00</button>
                <input type="time" id="native-time-picker" step="1" style="display:none;" aria-label="タイムピッカー（iOS）">
            </div>

            <div class="control-buttons">
                <button id="start-stop-btn" class="control-btn primary">スタート</button>
                <button id="reset-btn" class="control-btn">リセット</button>
            </div>
        </footer>
    </div>

    <!-- タイムピッカーモーダル -->
<div id="picker-modal" class="modal">
    <div class="modal-content">
        <h3>カスタム</h3>
        <div class="digit-picker">
            <div id="digit-display">
                <div class="digit-box active" id="db-0">0</div>
                <div class="digit-box" id="db-1">0</div>
                <span class="separator">:</span>
                <div class="digit-box" id="db-2">0</div>
                <div class="digit-box" id="db-3">0</div>
            </div>
        </div>
        <div class="keypad">
            <button class="key-btn" data-val="1">1</button>
            <button class="key-btn" data-val="2">2</button>
            <button class="key-btn" data-val="3">3</button>
            <button class="key-btn" data-val="4">4</button>
            <button class="key-btn" data-val="5">5</button>
            <button class="key-btn" data-val="6">6</button>
            <button class="key-btn" data-val="7">7</button>
            <button class="key-btn" data-val="8">8</button>
            <button class="key-btn" data-val="9">9</button>
            <button class="key-btn clear" id="key-clear">C</button>
            <button class="key-btn" data-val="0">0</button>
            <button class="key-btn backspace" id="key-back">⌫</button>
        </div>
        <div class="modal-buttons">
            <button id="picker-cancel" class="modal-btn cancel">やめる</button>
            <button id="picker-ok" class="modal-btn ok">OK!</button>
        </div>
    </div>
</div>

    <!-- アニメーション用のレイヤー -->
    <canvas id="animation-canvas"></canvas>
    <div id="animal-container"></div>

    <script src="main.js"></script>
    <script>
        // Service Workerの登録
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
